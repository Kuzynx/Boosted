<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B0B">
  <title>You're all set · Boosted</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0B0B0B;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .card {
      max-width: 380px;
      text-align: center;
    }
    .badge {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid #10B981;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      color: #10B981;
      font-size: 36px;
      font-weight: 800;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }
    p {
      color: #A1A1AA;
      font-size: 14px;
      line-height: 1.45;
      margin-top: 10px;
    }
    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 26px;
      background: #FF2D55;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border-radius: 999px;
      transition: opacity 0.15s ease;
    }
    .button:active { opacity: 0.7; }
    .hint {
      color: #6B7280;
      font-size: 12px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">✓</div>
    <h1>You're all set</h1>
    <p>
      Stripe onboarding is complete. Switch back to the Boosted app to start
      selling tickets to your meets.
    </p>
    <a class="button" href="myapp://stripe/return">Open Boosted</a>
    <p class="hint">
      If the app doesn't open automatically, switch to it manually from your
      home screen.
    </p>
  </main>
  <script>
    // Best-effort auto-bounce back to the native app via custom URL scheme.
    // iOS Safari may show a confirm dialog the first time; tapping Open is fine.
    setTimeout(function () {
      try { window.location.href = 'myapp://stripe/return'; } catch (e) {}
    }, 400);
  </script>
</body>
</html>
