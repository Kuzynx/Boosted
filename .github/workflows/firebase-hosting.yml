name: Deploy to Firebase Hosting

# Auto-deploys the site to Firebase Hosting (project boosted-2c2a6) on every
# push to main. Hosting only — Cloud Functions, Firestore, and Storage are
# deployed separately from the app project and are not touched here.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: boosted-2c2a6
