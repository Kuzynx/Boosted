name: Deploy to Firebase Hosting

# Auto-deploys the site to Firebase Hosting (project boosted-2c2a6) on every
# push to main. Hosting only — Cloud Functions, Firestore, and Storage are
# deployed separately from the app project and are not touched here.
#
# Auth uses a Firebase CI token (secret FIREBASE_TOKEN), generated locally with
# `firebase login:ci`. This deploys as your own account, which already has the
# right permissions — no service-account/IAM setup needed.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project boosted-2c2a6 --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
