<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B0B">
  <title>Onboarding expired · Boosted</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0B0B0B;
      color: #F8FAFC;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      min-height: 100vh;
      min-height: 100dvh;
    }
    .card {
      max-width: 380px;
      text-align: center;
    }
    .badge {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(255, 45, 85, 0.15);
      border: 1px solid #FF2D55;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      color: #FF2D55;
      font-size: 36px;
      font-weight: 800;
    }
    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }
    p {
      color: #A1A1AA;
      font-size: 14px;
      line-height: 1.45;
      margin-top: 10px;
    }
    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 14px 26px;
      background: #FF2D55;
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      border-radius: 999px;
      transition: opacity 0.15s ease;
    }
    .button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">!</div>
    <h1>Onboarding expired</h1>
    <p>
      Your Stripe onboarding session timed out. Switch back to the Boosted
      app and tap "Connect Stripe to get paid" again to restart.
    </p>
    <a class="button" href="myapp://stripe/refresh">Open Boosted</a>
  </main>
</body>
</html>
