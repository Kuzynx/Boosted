<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Thank You — Boosted</title>
  <link rel="icon" href="/turbo-logo.png" />
  <style>
    :root{--accent:#FF2D55;--bg:#050505;--card:#121212;--muted:#a0a0a0}
    html,body{height:100%}
    body{background:radial-gradient(circle at top,#2a0a10 0%,#050505 60%);color:#fff;font-family:Inter,system-ui,Arial,sans-serif;margin:0;display:flex;align-items:center;justify-content:center}
    .card{max-width:760px;padding:48px;text-align:center;background:linear-gradient(180deg,#0d0d0d,#0b0b0b);border-radius:18px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
    h1{font-size:2.25rem;margin:0 0 12px;letter-spacing:-1px}
    p{color:var(--muted);margin:0 0 18px}
    a.button{display:inline-block;padding:12px 20px;background:linear-gradient(90deg,var(--accent),#ff7a9a);color:#fff;border-radius:12px;text-decoration:none;font-weight:800}
    .logo{width:96px;height:96px;border-radius:18px;margin-bottom:18px;border:1px solid rgba(255,255,255,0.04);background:#000;object-fit:cover}
  </style>
</head>
<body>
  <div class="card">
    <img src="/turbo-logo.png" alt="Boosted" style="width:96px;height:96px;border-radius:18px;margin-bottom:18px;"/>
    <h1>Thanks — you’re on the list</h1>
    <p>We’ll email you as soon as Boosted launches. Meanwhile follow us on social for updates.</p>
    <p><a class="button" href="/">Back to home</a></p>
    <p style="color:#777;margin-top:18px;font-size:0.9rem">If you don't receive a confirmation, check your spam folder.</p>
  </div>
</body>
</html>
